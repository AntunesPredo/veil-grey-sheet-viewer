name: Deploy to GitHub Pages

on:
  push:
    branches: ["legacy-backup"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install & Build
        run: |
          npm install
          npm run build
        env: 
          VITE_PLAYER_WEBHOOK: ${{ secrets.VITE_PLAYER_WEBHOOK }}
          VITE_INVENTORY_WEBHOOK: ${{ secrets.VITE_INVENTORY_WEBHOOK }}
          VITE_APP_BASE_URL: ${{ secrets.VITE_APP_BASE_URL }}
          VITE_SECRET_KEY: ${{ secrets.VITE_SECRET_KEY }}
      
      - name: Delete old artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: github-pages

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy
        uses: actions/deploy-pages@v4
